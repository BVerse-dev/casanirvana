name: Sync Split Repos

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sync-split-repos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.repository == 'BVerse-dev/casanirvana'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - prefix: apps/api
            repo: casanirvana-backend
            ssh_secret: SPLIT_SYNC_KEY_BACKEND
          - prefix: apps/superadmin
            repo: casanirvana-superadmin
            ssh_secret: SPLIT_SYNC_KEY_SUPERADMIN
          - prefix: apps/resident-mobile
            repo: casanirvana-user-app
            ssh_secret: SPLIT_SYNC_KEY_USER
          - prefix: apps/guard-mobile
            repo: casanirvana-guard-app
            ssh_secret: SPLIT_SYNC_KEY_GUARD
          - prefix: supabase
            repo: casanirvana-platform
            ssh_secret: SPLIT_SYNC_KEY_PLATFORM

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Mirror ${{ matrix.prefix }} to ${{ matrix.repo }}
        env:
          SPLIT_REPO_SSH_KEY: ${{ secrets[matrix.ssh_secret] }}
        run: ./.github/scripts/sync-split-repo.sh "${{ matrix.prefix }}" "${{ matrix.repo }}"
