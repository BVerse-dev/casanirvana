name: Sync Split Repos

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sync-split-repos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.repository == 'BVerse-dev/casanirvana'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - prefix: backend
            repo: casanirvana-backend
          - prefix: superadmin
            repo: casanirvana-superadmin
          - prefix: user
            repo: casanirvana-user-app
          - prefix: Guard
            repo: casanirvana-guard-app
          - prefix: supabase
            repo: casanirvana-platform

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Mirror ${{ matrix.prefix }} to ${{ matrix.repo }}
        env:
          SPLIT_REPO_PUSH_TOKEN: ${{ secrets.SPLIT_REPO_PUSH_TOKEN }}
        run: ./.github/scripts/sync-split-repo.sh "${{ matrix.prefix }}" "${{ matrix.repo }}"
