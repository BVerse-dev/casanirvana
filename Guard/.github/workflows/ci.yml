name: Guard App CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: guard-app-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "true"
      EXPO_NO_TELEMETRY: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm run test:ci --if-present

      - name: Expo Doctor
        run: npx expo-doctor --non-interactive
