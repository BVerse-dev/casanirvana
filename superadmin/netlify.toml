[build]
  command = "npm install --legacy-peer-deps && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  # Omit scanning for expected Next.js and Supabase environment variables
  SECRETS_SCAN_OMIT_KEYS = "NEXTAUTH_SECRET,NEXTAUTH_URL,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY"

# Essential for Next.js on Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Static file handling for assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Handle Next.js static files
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Handle Next.js dynamic routes
[[redirects]]
  from = "/(admin)/*"
  to = "/(admin)/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
